spring.application.name=ai-code-review-assistant

# --- Database (Postgres / Supabase / Neon all work via standard JDBC URL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codereview}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- File upload ---
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:./uploads}
app.reports.dir=${REPORTS_DIR:./reports}

# --- JWT ---
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-in-prod-please}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- AI Provider ---
app.ai.provider=${AI_PROVIDER:openai}
app.ai.api-key=${AI_API_KEY:}
app.ai.model=${AI_MODEL:gpt-4o-mini}
app.ai.base-url=${AI_BASE_URL:https://api.openai.com/v1}

server.port=${PORT:8080}
